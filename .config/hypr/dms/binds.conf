# DMS + Hyprland keybinds
$mainMod = SUPER
$terminal = kitty
$fileManager = kitty -e yazi
$dms = dms ipc call

# Apps / session
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F2, exec, kitty -e /usr/bin/env bash -lc "~/.local/bin/script-hub"
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod ALT, P, pseudo,
bind = $mainMod, J, togglesplit,

# DMS core modals
bind = $mainMod, A, exec, $dms spotlight toggle
bind = $mainMod, S, exec, $dms control-center toggle
bind = $mainMod, comma, exec, $dms settings toggle
bind = $mainMod, V, exec, $dms clipboard toggle
bind = $mainMod, N, exec, $dms notifications toggle
bind = $mainMod, X, exec, $dms powermenu toggle
bind = $mainMod, L, exec, $dms lock lock
bind = $mainMod, O, exec, $dms hypr toggleOverview
bind = $mainMod, slash, exec, $dms keybinds toggle hyprland
bind = $mainMod SHIFT, T, exec, $dms theme toggle
bind = $mainMod SHIFT, W, exec, $dms wallpaper next

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, apostrophe, togglespecialworkspace, magic
bind = $mainMod SHIFT, apostrophe, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys via DMS IPC
bindel = , XF86AudioRaiseVolume, exec, $dms audio increment 5
bindel = , XF86AudioLowerVolume, exec, $dms audio decrement 5
bindl  = , XF86AudioMute,        exec, $dms audio mute
bindel = , XF86AudioMicMute,     exec, $dms audio micmute
bindel = , XF86MonBrightnessUp,   exec, $dms brightness increment 5
bindel = , XF86MonBrightnessDown, exec, $dms brightness decrement 5
bindl = , XF86AudioNext,  exec, $dms mpris next
bindl = , XF86AudioPause, exec, $dms mpris playPause
bindl = , XF86AudioPlay,  exec, $dms mpris playPause
bindl = , XF86AudioPrev,  exec, $dms mpris previous


# Screenshot / OCR / annotation (grimblast)
bind = $mainMod, P, exec, grimblast copysave area -n
bind = $mainMod SHIFT, P, exec, grimblast copysave active -n
bind = $mainMod CTRL, P, exec, grimblast copysave screen -n
bind = $mainMod SHIFT, O, exec, sh -lc "grimblast save area - | tesseract stdin stdout | wl-copy && notify-send 'Clipboard:' \"$(wl-paste)\""
bind = $mainMod, M, exec, sh -lc "wl-paste | swappy -f -"
